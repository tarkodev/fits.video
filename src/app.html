<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<meta name="theme-color" content="#000000" />
	<meta name="description" content="Perfectly compressed video files just under 8MB (or any size, you choose)." />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
	<link rel="manifest" href="/manifest.json" />
	<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
	<link rel="apple-touch-icon" href="/icons/icon-192.svg" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

	<!-- SEO & Open Graph -->
	<meta property="og:type" content="website" />
	<meta property="og:url" content="https://fits.video/" />
	<meta property="og:title" content="fits.video: online compressor (free and open source!)" />
	<meta property="og:description"
		content="Perfectly compressed video files just under 8MB (or any size, you choose)." />
	<meta property="og:image" content="https://fits.video/logo.png" />
	<meta property="og:site_name" content="fits.video" />

	<!-- Twitter Card -->
	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:site" content="@fitsvideo" />
	<meta name="twitter:title" content="fits.video: online compressor (free and open source!)" />
	<meta name="twitter:description"
		content="Perfectly compressed video files just under 8MB (or any size, you choose)." />
	<meta name="twitter:image" content="https://fits.video/logo.png" />

	<!-- Additional SEO -->
	<link rel="canonical" href="https://fits.video/" />
	<meta name="robots" content="index, follow" />
	<meta name="author" content="Tarkod" />
	<meta name="keywords"
		content="video compressor, compress video, discord video, 8mb video, free video compression, online compression" />

	<title>fits.video: online compressor (free and open source!)</title>
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
